<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@{{ user.kullanici_adi }} | AMES.lol</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* profilsayfasıstili */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #050505;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid rgba(157, 0, 255, 0.5);
            padding: 5px;
            object-fit: cover;
        }

        .username {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .bio {
            color: #aaa;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-link {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.03);
            border-color: rgba(157, 0, 255, 0.5);
        }

        .discord-tag {
            font-size: 12px;
            color: #9d00ff;
            text-transform: uppercase;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>

    <div class="profile-card">
        <img src="https://api.dicebear.com/7.x/shapes/svg?seed={{ user.kullanici_adi }}" alt="avatar" class="profile-pic">

        <h1 class="username">@{{ user.kullanici_adi }}</h1>

        <p class="bio">{{ user.bio }}</p>

        <div class="links-container">
            {% if user.discord %}
            <div class="social-link">
                <span class="discord-tag">Discord:</span> {{ user.discord }}
            </div>
            {% endif %}

            <a href="#" class="social-link">Instagram</a>
            <a href="/" class="social-link" style="background: white; color: black;">Sen de Oluştur</a>
        </div>
    </div>
</body>
</html>
