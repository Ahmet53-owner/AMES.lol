<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMES.lol | Profilini Oluştur</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* tasarımmmmm dokunusları */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .main-title {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        .sub-title {
            color: #888;
            font-size: 18px;
            margin-bottom: 40px;
            max-width: 500px;
        }

        .registration-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .custom-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 16px;
        }

        .custom-input:focus {
            border-color: #9d00ff;
            background: rgba(255, 255, 255, 0.08);
        }

        .login-link {
            margin-top: 25px;
            color: #666;
            font-size: 14px;
            text-decoration: none;
            transition: 0.3s;
        }

        .login-link:hover {
            color: white;
        }

        .login-link b {
            color: #9d00ff;
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>

    <div class="hero-section">
        <h1 class="main-title">AMES.<span class="gradient-text">lol</span></h1>
        <p class="sub-title">Kendini dünyaya tanıtmanın en şık yolu ancak AMES.lol ile olur.</p>

        <div class="registration-box">
            <form action="/kayit" method="POST">
                <div class="input-group">
                    <div style="display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0 15px;">
                        <span style="color: #555; font-weight: bold;">AMES.lol/</span>
                        <input type="text" name="kullanici_adi" placeholder="kullaniciadi"
                               style="background: transparent; border: none; color: white; padding: 15px 5px; outline: none; width: 100%;" required>
                    </div>

                    <input type="password" name="sifre" placeholder="Güçlü bir şifre seçin" class="custom-input" required>
                </div>

                <button type="submit" class="btn-main" style="width: 100%; padding: 18px; font-size: 16px;">
                    Ücretsiz Sayfanı Oluştur
                </button>
            </form>
        </div>

        <a href="/login" class="login-link">
            Zaten bir hesabın var mı? <b>Giriş Yap</b>
        </a>
    </div>
</body>
</html>
