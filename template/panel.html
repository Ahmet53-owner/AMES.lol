<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel | @{{ user.kullanici_adi }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            background-color: #050505;
            color: white;
            justify-content: center;
            align-items: center;
        }

        .panel-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .panel-header h2 {
            font-size: 24px;
            font-weight: 900;
        }

        .input-wrapper {
            margin-bottom: 20px;
        }

        .input-wrapper label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            margin-left: 5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .panel-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .panel-input:focus {
            border-color: #9d00ff;
            background: rgba(255, 255, 255, 0.08);
        }

        .save-btn {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .save-btn:hover {
            transform: scale(1.02);
            background: #e0e0e0;
        }

        .action-links {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .action-links a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .action-links a:hover {
            color: white;
        }

        .view-profile {
            color: #9d00ff !important;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>

    <div class="panel-container">
        <div class="glass-card">
            <div class="panel-header">
                <h2>Profil <span class="gradient-text">Ayarları</span></h2>
                <p style="color: #555; font-size: 14px;">Bilgilerini buradan güncelleyebilirsin.</p>
            </div>

            <form action="/guncelle" method="POST">
                <div class="input-wrapper">
                    <label>Kullanıcı Adın</label>
                    <input type="text" value="@{{ user.kullanici_adi }}" class="panel-input" disabled style="opacity: 0.5; cursor: not-allowed;">
                </div>

                <div class="input-wrapper">
                    <label>Biyografi Mesajın</label>
                    <input type="text" name="yeni_bio" value="{{ user.bio }}" placeholder="Kendinden bahset..." class="panel-input">
                </div>

                <div class="input-wrapper">
                    <label>Discord Adresiniz</label>
                    <input type="text" name="yeni_discord" value="{{ user.discord }}" placeholder="kullanici#0000" class="panel-input">
                </div>

                <button type="submit" class="save-btn">Değişiklikleri Kaydet</button>
            </form>

            <div class="action-links">
                <a href="/logout">Oturumu Kapat</a>
                <a href="/{{ user.kullanici_adi }}" class="view-profile" target="_blank">Profilimi Gör →</a>
            </div>
        </div>
    </div>
</body>
</html>
