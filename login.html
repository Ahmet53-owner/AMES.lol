<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | AMES.lol</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-dots"></div>

    <div style="height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;">
        <div class="glass-card" style="width: 100%; max-width: 400px; text-align: center;">
            <h2 style="margin-bottom: 10px; font-weight: 900;">Tekrar <span class="gradient-text">Hoş Geldin</span></h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 30px;">Profilini yönetmek için giriş yap.</p>

            <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="claim-username" style="width: 100%; background: rgba(255,255,255,0.03);">
                    <input type="text" name="kullanici_adi" placeholder="Kullanıcı Adı" id="username-input" required>
                </div>

                <div class="claim-username" style="width: 100%; background: rgba(255,255,255,0.03);">
                    <input type="password" name="sifre" placeholder="Şifre" id="password-input"
                           style="background: transparent; border: none; color: white; padding: 12px; outline: none; width: 100%;" required>
                </div>

                <button type="submit" class="btn-main" style="width: 100%; margin-top: 10px;">Giriş Yap</button>
            </form>

            <p style="margin-top: 20px; font-size: 13px; color: #888;">
                Hesabın yok mu? <a href="/" style="color: white; text-decoration: none; font-weight: bold;">Kayıt Ol</a>
            </p>
        </div>
    </div>
</body>
</html>
